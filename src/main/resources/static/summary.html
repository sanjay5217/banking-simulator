<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Statement — BankDB</title>
    <link rel="stylesheet" href="style/dashboard.css">
    <link rel="stylesheet" href="style/summary.css">
</head>
<body>
    <div class="page">
        <header class="topbar no-print">
            <a href="#" id="back-btn" class="back">← Back</a>
            <span class="brand">BankDB</span>
        </header>

        <div class="statement-controls no-print">
            <div class="filter-group">
                <label class="filter-label">Period</label>
                <select id="month-picker">
                    <option value="">All Time</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Type</label>
                <div class="type-toggle">
                    <button class="type-btn active" data-type="all">All</button>
                    <button class="type-btn" data-type="in">Credits</button>
                    <button class="type-btn" data-type="out">Debits</button>
                </div>
            </div>
            <button class="print-btn" onclick="window.print()">Print / Save PDF</button>
        </div>

        <nav class="section-nav no-print">
            <button class="nav-tab active" data-tab="statement">Statement</button>
            <button class="nav-tab" data-tab="visuals">Visuals</button>
        </nav>

        <main class="statement-wrap">

            <div class="statement-doc" id="tab-statement">

                <div class="doc-header">
                    <div class="doc-bank">
                        <span class="doc-bank-name">BankDB</span>
                        <span class="doc-bank-sub">Account Statement</span>
                    </div>
                    <div class="doc-meta">
                        <div class="doc-meta-row">
                            <span class="doc-meta-label">Account Holder</span>
                            <span class="doc-meta-value" id="customer-name">—</span>
                        </div>
                        <div class="doc-meta-row">
                            <span class="doc-meta-label">Account</span>
                            <span class="doc-meta-value" id="account-label">—</span>
                        </div>
                        <div class="doc-meta-row">
                            <span class="doc-meta-label">Period</span>
                            <span class="doc-meta-value" id="period-label">—</span>
                        </div>
                        <div class="doc-meta-row">
                            <span class="doc-meta-label">Generated</span>
                            <span class="doc-meta-value" id="generated-date">—</span>
                        </div>
                    </div>
                </div>

                <div class="doc-balances">
                    <div class="doc-balance-item">
                        <span class="doc-balance-label">Opening Balance</span>
                        <span class="doc-balance-value" id="opening-balance">—</span>
                    </div>
                    <div class="doc-balance-divider"></div>
                    <div class="doc-balance-item">
                        <span class="doc-balance-label">Closing Balance</span>
                        <span class="doc-balance-value" id="closing-balance">—</span>
                    </div>
                </div>

                <table class="doc-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th class="num">Debit</th>
                            <th class="num">Credit</th>
                            <th class="num">Balance</th>
                        </tr>
                    </thead>
                    <tbody id="statement-body">
                        <tr class="empty-row"><td colspan="5">No transactions</td></tr>
                    </tbody>
                </table>

                <div class="doc-footer">
                    <div class="doc-footer-row">
                        <span>Total Credits</span>
                        <span class="amount-positive" id="stat-in">—</span>
                    </div>
                    <div class="doc-footer-row">
                        <span>Total Debits</span>
                        <span class="amount-negative" id="stat-out">—</span>
                    </div>
                    <div class="doc-footer-row doc-footer-net">
                        <span>Net Change</span>
                        <span id="stat-net">—</span>
                    </div>
                    <div class="doc-footer-row doc-footer-total">
                        <span>Transaction Count</span>
                        <span id="stat-count">—</span>
                    </div>
                </div>

            </div>

            <div class="visuals-panel" id="tab-visuals" style="display:none">
                <div class="visuals-controls">
                    <label class="filter-label">Chart</label>
                    <select id="chart-type">
                        <option value="cashflow">Monthly Cash Flow</option>
                        <option value="description">Spending by Type</option>
                    </select>
                </div>
                <div class="chart-wrap">
                    <canvas id="main-chart"></canvas>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/api.js"></script>
    <script src="js/summary.js"></script>
</body>
</html>
