<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer — BankDB</title>
    <link rel="stylesheet" href="style/dashboard.css">
</head>
<body>
    <div class="page">
        <header class="topbar">
            <a href="#" id="back-btn" class="back">← Back</a>
            <span class="brand">BankDB</span>
        </header>
        <main class="form-page transfer-page">
            <div class="form-card-header transfer-header">
                <h1 class="form-title">Transfer</h1>
                <div class="form-account-info">
                    <span class="acct-label" id="account-label">—</span>
                    <span class="acct-balance" id="account-balance">—</span>
                </div>
            </div>
            <div class="transfer-grid">
                <div class="form-card">
                    <div class="form-card-top">
                        <h2 class="form-section-title">Internal Transfer</h2>
                        <p class="form-section-desc">Move money between your own accounts</p>
                    </div>
                    <form id="internal-form">
                        <div class="form-field">
                            <label for="internal-to">To Account</label>
                            <select id="internal-to">
                                <option value="">Select account...</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="internal-amount">Amount</label>
                            <input type="number" id="internal-amount" step="0.01" min="0.01" placeholder="0.00">
                        </div>
                        <p class="form-error" id="internal-error"></p>
                        <button type="submit" class="btn-primary" id="internal-btn">Transfer</button>
                    </form>
                </div>
                <div class="form-card">
                    <div class="form-card-top">
                        <h2 class="form-section-title">External Transfer</h2>
                        <p class="form-section-desc">Send money to another customer's account</p>
                    </div>
                    <form id="external-form">
                        <div class="form-field">
                            <label for="external-customer">Customer</label>
                            <select id="external-customer">
                                <option value="">Select customer...</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="external-to">Destination Account</label>
                            <select id="external-to" disabled>
                                <option value="">Select customer first...</option>
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="external-amount">Amount</label>
                            <input type="number" id="external-amount" step="0.01" min="0.01" placeholder="0.00">
                        </div>
                        <p class="form-error" id="external-error"></p>
                        <button type="submit" class="btn-primary" id="external-btn">Transfer</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/transfer.js"></script>
</body>
</html>
